{% extends "base.html" %}
{% block title %}客户助手{% endblock %}
{% block body %}
<header class="header">
  <h1>客户助手</h1>
</header>

<form class="search" method="get" action="/customers"
      hx-get="/_p/customer-list"
      hx-trigger="input changed delay:300ms from:input, search from:input"
      hx-target="#list"
      hx-swap="innerHTML"
      hx-include="[name='tab']">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
  </svg>
  <input type="search" name="q" value="{{ q }}"
         placeholder="{% if tab == 'records' %}搜索客户 / 主题 / 进展 / 内容{% else %}搜索客户名{% endif %}"
         autocomplete="off" />
  <input type="hidden" name="tab" value="{{ tab }}" />
  {% if owner %}<input type="hidden" name="owner" value="{{ owner }}" />{% endif %}
  {% if sort and sort != 'viewed' %}<input type="hidden" name="sort" value="{{ sort }}" />{% endif %}
</form>

<nav class="tabs">
  <a href="/customers?tab=customers{% if q %}&q={{ q|urlencode }}{% endif %}"
     class="{% if tab == 'customers' %}active{% endif %}">客户</a>
  <a href="/customers?tab=records{% if q %}&q={{ q|urlencode }}{% endif %}"
     class="{% if tab == 'records' %}active{% endif %}">跟进记录</a>
</nav>

{% if tab == 'customers' %}
<div class="sort-bar">
  <div class="sort-menu" id="sort-menu">
    <button type="button" class="sort-trigger" id="sort-btn">
      <span id="sort-label">{% if sort == 'mine' %}我的客户{% else %}最近查看{% endif %}</span>
      <span class="sort-caret" aria-hidden="true">▾</span>
    </button>
    <div class="sort-panel" id="sort-panel" hidden role="menu">
      <a class="sort-item {% if sort == 'viewed' %}active{% endif %}"
         href="/customers?tab=customers&sort=viewed{% if q %}&q={{ q|urlencode }}{% endif %}"
         data-sort="viewed" role="menuitem">最近查看</a>
      <a class="sort-item {% if sort == 'mine' %}active{% endif %}"
         href="/customers?tab=customers&sort=mine{% if q %}&q={{ q|urlencode }}{% endif %}"
         data-sort="mine" role="menuitem">我的客户</a>
    </div>
  </div>
</div>
<script>
(function() {
  var menu = document.getElementById('sort-menu');
  if (!menu) return;
  var btn = document.getElementById('sort-btn');
  var panel = document.getElementById('sort-panel');
  btn.addEventListener('click', function(e) {
    e.stopPropagation();
    panel.hidden = !panel.hidden;
  });
  document.addEventListener('click', function(e) {
    if (!menu.contains(e.target)) panel.hidden = true;
  });
})();
</script>
{% endif %}

<div id="list" class="list">
  {% include "_rows.html" %}
</div>
{% endblock %}
