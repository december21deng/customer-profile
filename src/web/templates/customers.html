{% extends "base.html" %}
{% block title %}客户助手{% endblock %}
{% block body %}
<header class="header">
  <svg class="brand-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
    <circle cx="12" cy="7" r="3" fill="currentColor"/>
    <circle cx="6" cy="17" r="2.5" fill="currentColor" fill-opacity="0.55"/>
    <circle cx="18" cy="17" r="2.5" fill="currentColor" fill-opacity="0.55"/>
    <path d="M12 10 L6 15 M12 10 L18 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  </svg>
  <h1>客户助手</h1>
</header>

<form class="search" method="get" action="/customers"
      hx-get="/_p/customer-list"
      hx-trigger="input changed delay:300ms from:input, search from:input"
      hx-target="#list"
      hx-swap="innerHTML"
      hx-include="[name='tab']">
  <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/>
  </svg>
  <input type="search" name="q" value="{{ q }}"
         placeholder="{% if tab == 'records' %}搜索客户 / 主题 / 进展 / 内容{% else %}搜索客户名{% endif %}"
         autocomplete="off" />
  <input type="hidden" name="tab" value="{{ tab }}" />
  {% if owner %}<input type="hidden" name="owner" value="{{ owner }}" />{% endif %}
</form>

<nav class="tabs">
  <a href="/customers?tab=customers{% if q %}&q={{ q|urlencode }}{% endif %}"
     class="{% if tab == 'customers' %}active{% endif %}">客户</a>
  <a href="/customers?tab=records{% if q %}&q={{ q|urlencode }}{% endif %}"
     class="{% if tab == 'records' %}active{% endif %}">跟进记录</a>
</nav>

{% if tab == 'customers' %}
<div class="list-sort-label">
  <span>最近查看</span>
  <span class="caret" aria-hidden="true">▾</span>
</div>
{% endif %}

<div id="list" class="list">
  {% include "_rows.html" %}
</div>
{% endblock %}
